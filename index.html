<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenNotes - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Fixed Save Container for Mobile */
        .mobile-save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #f1f5f9;
            padding: 1rem;
            z-index: 1000;
        }

        /* Fixed Search Highlighting */
        mark.search-highlight {
            background-color: #fde047;
            color: #1e293b;
            border-radius: 2px;
            padding: 0 2px;
            margin: 0;
        }

        mark.active-match {
            background-color: #4f46e5 !important;
            color: white !important;
            border-radius: 4px;
            padding: 0 4px;
            box-shadow: 0 0 0 2px #e0e7ff;
        }

        /* Search Controls Positioned at Bottom Center for Mobile */
        #search-controls {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            width: 92%;
            bottom: 20px;
        }

        /* Force Header to Stay Visible Always */
        #mobile-header-elements {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            #editor-mode .content-area {
                padding-bottom: 100px;
            }
        }

        @media (min-width: 769px) {
            #search-controls {
                bottom: 3rem;
                width: auto;
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 h-screen w-screen flex flex-col md:flex-row relative">

    <!-- MOBILE OVERLAY -->
    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white border-r border-slate-200 flex flex-col h-full z-50 shadow-2xl transition-transform -translate-x-full md:translate-x-0 md:relative md:flex shrink-0">
        <div class="p-5 border-b border-slate-50 space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="text-xl font-black text-slate-800 flex items-center gap-2 tracking-tighter">
                        <div class="p-1.5 bg-indigo-600 rounded-lg text-white shadow-lg">
                            <i data-lucide="sticky-note" class="w-5 h-5"></i>
                        </div> 
                        NOTES
                    </h1>
                    <span class="text-[9px] font-bold text-indigo-500 tracking-[0.3em] ml-9 -mt-1">VERSION 2.8</span>
                </div>
                <div class="flex items-center gap-2">
                    <div id="note-count" class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg text-[10px] font-black uppercase">0</div>
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400 p-1">
                        <i data-lucide="chevrons-left"></i>
                    </button>
                </div>
            </div>
            
            <div class="relative group hidden md:block">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-4 h-4"></i>
                <input 
                    type="text" 
                    id="desktop-search-input"
                    oninput="handleSearch(this.value, 'desktop')"
                    placeholder="Search notes..." 
                    class="search-input-field w-full pl-9 pr-3 py-2 bg-slate-50 border-2 border-transparent rounded-xl focus:bg-white focus:border-indigo-400 outline-none transition-all text-sm font-bold shadow-inner" 
                />
            </div>

            <button 
                onclick="showEditor(); if(window.innerWidth < 768) toggleSidebar();"
                class="w-full bg-slate-900 text-white py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-all font-black text-xs active:scale-95 shadow-lg uppercase tracking-widest"
            >
                <i data-lucide="plus" class="w-4 h-4"></i> NEW NOTE
            </button>
        </div>

        <div class="flex border-b border-slate-50">
            <button onclick="switchSidebarTab('main')" id="tab-main" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 border-indigo-600 text-indigo-600">My Notes</button>
            <button onclick="switchSidebarTab('trash')" id="tab-trash" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-slate-600">Recycle Bin</button>
        </div>

        <div id="notes-list" class="overflow-y-auto flex-1 p-3 space-y-3 bg-slate-50/50 custom-scrollbar"></div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main id="main-content" class="flex-1 bg-white overflow-hidden flex flex-col relative w-full">
        
        <!-- MOBILE HEADER -->
        <header id="mobile-header-elements" class="p-3 md:p-6 border-b border-slate-50 bg-white/80 backdrop-blur-xl z-30 flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors md:hidden">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            
            <div class="flex-1 relative group">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input 
                    type="text" 
                    id="mobile-search-input"
                    oninput="handleSearch(this.value, 'mobile')"
                    placeholder="Search everything..." 
                    class="search-input-field w-full pl-9 pr-3 py-2 md:py-3 bg-slate-100/50 border-2 border-transparent rounded-xl focus:bg-white focus:border-indigo-400 outline-none transition-all text-xs md:text-sm font-bold" 
                />
            </div>

            <div id="header-actions" class="flex items-center gap-2"></div>
        </header>

        <!-- View Mode -->
        <div id="view-mode" class="flex-1 flex flex-col hidden overflow-hidden">
            <div class="flex-1 overflow-y-auto p-6 md:p-20 scroll-smooth pb-40 custom-scrollbar">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center gap-2 mb-6">
                        <div id="view-fav-indicator" class="hidden"><i data-lucide="star" class="w-4 h-4 text-amber-400 fill-amber-400"></i></div>
                        <div class="w-2 h-2 bg-indigo-500 rounded-full"></div>
                        <span class="text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Viewing Note</span>
                    </div>
                    <h2 id="display-title" class="text-3xl md:text-7xl font-black text-slate-900 leading-tight mb-8 tracking-tighter"></h2>
                    <div id="display-content" class="text-slate-600 text-lg md:text-4xl leading-relaxed whitespace-pre-wrap border-t-2 md:border-t-8 border-slate-50 pt-8 font-medium"></div>
                </div>
            </div>
        </div>

        <!-- Editor Mode -->
        <div id="editor-mode" class="flex-1 flex flex-col hidden overflow-hidden relative">
            <div class="content-area flex-1 overflow-y-auto p-6 md:p-20 scroll-smooth custom-scrollbar">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center gap-2 bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-xl text-[9px] md:text-[10px] font-black uppercase tracking-widest w-max mb-8">
                        <i data-lucide="target" class="w-3 h-3"></i> <span id="editor-status">Creating</span>
                    </div>
                    <input 
                        type="text" 
                        id="note-title-input"
                        placeholder="Untitled Headline" 
                        class="w-full text-3xl md:text-7xl font-black border-none focus:ring-0 placeholder-slate-200 text-slate-900 bg-transparent outline-none tracking-tighter mb-4 md:mb-10" 
                    />
                    <textarea 
                        id="note-content-input"
                        placeholder="Start typing your thoughts here..." 
                        class="w-full min-h-[300px] md:min-h-[500px] border-none focus:ring-0 text-lg md:text-3xl text-slate-700 resize-none placeholder-slate-100 leading-relaxed bg-transparent outline-none font-medium"
                    ></textarea>
                </div>
            </div>
            
            <div class="mobile-save-bar md:relative md:bg-white/80 md:backdrop-blur-md md:border-t md:p-8 flex justify-end">
                <button onclick="saveNote()" class="w-full md:w-auto flex items-center justify-center gap-3 px-10 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-600 transition-all text-sm md:text-lg active:scale-95 uppercase tracking-widest">
                    <i data-lucide="save" class="w-5 h-5"></i> SAVE NOTE
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="h-full flex flex-col items-center justify-center p-8 text-center bg-slate-50/40">
            <div class="w-32 h-32 md:w-64 md:h-64 bg-white rounded-[40px] shadow-xl flex items-center justify-center text-indigo-100 mb-8 animate-pulse">
                <i data-lucide="sticky-note" class="w-16 h-16 md:w-24 md:h-24"></i>
            </div>
            <h2 class="text-2xl md:text-6xl font-black text-slate-800 mb-2 tracking-tighter">Select a Note</h2>
            <p class="text-slate-400 text-xs md:text-2xl font-semibold max-w-xs">Apne vichar likhna shuru karein.</p>
        </div>

        <!-- SEARCH CONTROLS -->
        <div id="search-controls" class="hidden">
            <div class="bg-slate-900/95 backdrop-blur-2xl text-white px-4 py-3 md:px-8 md:py-5 rounded-3xl shadow-2xl border border-white/10 flex items-center justify-between md:gap-10">
                <div class="flex flex-col">
                    <span class="text-[8px] md:text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none mb-1">Matches</span>
                    <span class="text-lg md:text-3xl font-black tabular-nums leading-none">
                        <span id="current-match">1</span> <span class="text-slate-500 text-xs md:text-sm font-medium">/</span> <span id="total-matches">0</span>
                    </span>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <button onclick="prevMatch()" class="w-10 h-10 md:w-16 bg-white/5 hover:bg-white/10 rounded-full flex items-center justify-center transition-colors active:bg-white/20"><i data-lucide="chevron-left"></i></button>
                    <button onclick="nextMatch()" class="w-10 h-10 md:w-16 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-90"><i data-lucide="chevron-right"></i></button>
                </div>
                <button onclick="clearSearch()" class="p-2 ml-2 hover:text-red-400 active:scale-110 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'my-local-notes-v4';
        let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            { id: 1, title: 'Welcome!', content: 'Search karke dekhiye, ab layout bilkul sahi rahega.', favorite: false, deleted: false }
        ];
        
        let currentNoteId = null;
        let sidebarTab = 'main';
        let matchIndex = 0;
        let matches = [];
        let globalSearchTerm = "";

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        const notesList = document.getElementById('notes-list');
        const emptyState = document.getElementById('empty-state');
        const viewMode = document.getElementById('view-mode');
        const editorMode = document.getElementById('editor-mode');
        const displayTitle = document.getElementById('display-title');
        const displayContent = document.getElementById('display-content');
        const titleInput = document.getElementById('note-title-input');
        const contentInput = document.getElementById('note-content-input');
        const searchControls = document.getElementById('search-controls');
        const currentMatchEl = document.getElementById('current-match');
        const totalMatchesEl = document.getElementById('total-matches');
        const headerActions = document.getElementById('header-actions');

        window.addEventListener('load', () => {
            lucide.createIcons();
            renderNotes();
        });

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function handleSearch(val, source) {
            globalSearchTerm = val;
            
            if (source === 'mobile') {
                const desktopInput = document.getElementById('desktop-search-input');
                if (desktopInput) desktopInput.value = val;
            } else if (source === 'desktop') {
                const mobileInput = document.getElementById('mobile-search-input');
                if (mobileInput) mobileInput.value = val;
            }

            renderNotes();
            if (currentNoteId) updateDisplay();
        }

        function switchSidebarTab(tab) {
            sidebarTab = tab;
            document.getElementById('tab-main').className = `flex-1 py-3 text-[10px] font-black uppercase border-b-2 ${tab === 'main' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`;
            document.getElementById('tab-trash').className = `flex-1 py-3 text-[10px] font-black uppercase border-b-2 ${tab === 'trash' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`;
            renderNotes();
        }

        function renderNotes() {
            const term = globalSearchTerm.toLowerCase().trim();
            let filtered = notes.filter(n => {
                const matchesSearch = n.title.toLowerCase().includes(term) || n.content.toLowerCase().includes(term);
                const matchesTab = sidebarTab === 'trash' ? n.deleted === true : n.deleted !== true;
                return matchesSearch && matchesTab;
            });

            if (sidebarTab === 'main') {
                filtered.sort((a, b) => (b.favorite === a.favorite) ? 0 : b.favorite ? 1 : -1);
            }

            document.getElementById('note-count').innerText = notes.filter(n => !n.deleted).length;
            
            if (filtered.length === 0) {
                notesList.innerHTML = `<div class="p-8 text-center opacity-30 font-black text-[10px] uppercase text-slate-400 mt-10">Empty</div>`;
                return;
            }

            notesList.innerHTML = filtered.map(n => `
                <div onclick="selectNote(${n.id}); if(window.innerWidth < 768) toggleSidebar();" 
                     class="group p-4 rounded-2xl cursor-pointer transition-all border-2 ${n.favorite && !n.deleted ? 'bg-indigo-50/50 border-indigo-100' : 'bg-white border-transparent'} ${currentNoteId === n.id ? '!border-indigo-500 shadow-md' : 'hover:border-slate-100'}">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex items-center gap-1.5 overflow-hidden">
                            ${n.favorite && !n.deleted ? '<i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i>' : ''}
                            <h3 class="font-black text-xs text-slate-800 line-clamp-1">${n.title}</h3>
                        </div>
                        <div class="flex items-center gap-2">
                            ${sidebarTab === 'main' ? `
                                <button onclick="event.stopPropagation(); toggleFavorite(${n.id})" class="text-slate-300 hover:text-amber-400"><i data-lucide="star" class="w-3.5 h-3.5 ${n.favorite ? 'fill-amber-400 text-amber-400' : ''}"></i></button>
                                <button onclick="event.stopPropagation(); moveToTrash(${n.id})" class="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            ` : `
                                <button onclick="event.stopPropagation(); restoreNote(${n.id})" class="text-slate-300 hover:text-green-500"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i></button>
                                <button onclick="event.stopPropagation(); permanentlyDelete(${n.id})" class="text-slate-300 hover:text-red-600"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i></button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleFavorite(id) {
            notes = notes.map(n => n.id === id ? { ...n, favorite: !n.favorite } : n);
            saveToStorage();
            renderNotes();
            if (currentNoteId === id) updateDisplay();
        }

        function moveToTrash(id) {
            notes = notes.map(n => n.id === id ? { ...n, deleted: true, favorite: false } : n);
            saveToStorage();
            if (currentNoteId === id) resetUI();
            renderNotes();
        }

        function restoreNote(id) {
            notes = notes.map(n => n.id === id ? { ...n, deleted: false } : n);
            saveToStorage();
            renderNotes();
        }

        function permanentlyDelete(id) {
            notes = notes.filter(n => n.id !== id);
            saveToStorage();
            renderNotes();
        }

        function selectNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if(!note) return;
            
            emptyState.classList.add('hidden');
            editorMode.classList.add('hidden');
            viewMode.classList.remove('hidden');
            
            headerActions.innerHTML = note.deleted ? 
                `<button onclick="restoreNote(${id}); selectNote(${id})" class="p-2 text-green-600"><i data-lucide="rotate-ccw"></i></button>` : 
                `<button onclick="editCurrentNote()" class="p-2 bg-slate-900 text-white rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`;

            updateDisplay();
            renderNotes();
            lucide.createIcons();
        }

        function updateDisplay() {
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            displayTitle.innerHTML = smartHighlight(note.title, globalSearchTerm);
            displayContent.innerHTML = smartHighlight(note.content, globalSearchTerm);
            document.getElementById('view-fav-indicator').className = (note.favorite && !note.deleted) ? 'block' : 'hidden';
            updateSearchMatches();
        }

        function smartHighlight(text, highlight) {
            if (!highlight) return text;
            const regex = new RegExp(`(${highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, `<mark class="search-highlight">$1</mark>`);
        }

        function updateSearchMatches() {
            const term = globalSearchTerm.trim();
            if (!term) { 
                searchControls.classList.add('hidden'); 
                return; 
            }
            // Ensure matches are calculated on the currently viewed content
            matches = Array.from(document.querySelectorAll('#view-mode mark.search-highlight'));
            
            if (matches.length > 0) {
                searchControls.classList.remove('hidden');
                totalMatchesEl.innerText = matches.length;
                // Don't auto-reset index unless strictly necessary to prevent UI jumps
                goToMatch(matchIndex < matches.length ? matchIndex : 0);
            } else { 
                searchControls.classList.add('hidden'); 
            }
        }

        function goToMatch(index) {
            if (matches.length === 0) return;
            matches.forEach(m => m.classList.remove('active-match'));
            matchIndex = (index + matches.length) % matches.length;
            const active = matches[matchIndex];
            if (active) {
                active.classList.add('active-match');
                active.scrollIntoView({ behavior: 'smooth', block: 'center' });
                currentMatchEl.innerText = matchIndex + 1;
            }
        }

        function nextMatch() { goToMatch(matchIndex + 1); }
        function prevMatch() { goToMatch(matchIndex - 1); }

        function showEditor() {
            currentNoteId = null;
            titleInput.value = "";
            contentInput.value = "";
            document.getElementById('editor-status').innerText = "Creating";
            headerActions.innerHTML = `<button onclick="closeEditor()" class="p-2 text-slate-400"><i data-lucide="x"></i></button>`;
            emptyState.classList.add('hidden');
            viewMode.classList.add('hidden');
            editorMode.classList.remove('hidden');
            searchControls.classList.add('hidden');
            lucide.createIcons();
        }

        function editCurrentNote() {
            const note = notes.find(n => n.id === currentNoteId);
            titleInput.value = note.title;
            contentInput.value = note.content;
            document.getElementById('editor-status').innerText = "Editing";
            headerActions.innerHTML = `<button onclick="closeEditor()" class="p-2 text-slate-400"><i data-lucide="x"></i></button>`;
            viewMode.classList.add('hidden');
            editorMode.classList.remove('hidden');
            searchControls.classList.add('hidden');
            lucide.createIcons();
        }

        function saveNote() {
            const title = titleInput.value.trim() || "Untitled Note";
            const content = contentInput.value.trim();
            if (currentNoteId) {
                notes = notes.map(n => n.id === currentNoteId ? {...n, title, content} : n);
            } else {
                const newNote = { id: Date.now(), title, content, favorite: false, deleted: false };
                notes.unshift(newNote);
                currentNoteId = newNote.id;
            }
            saveToStorage();
            closeEditor();
            selectNote(currentNoteId);
        }

        function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

        function closeEditor() {
            editorMode.classList.add('hidden');
            if (currentNoteId) selectNote(currentNoteId);
            else resetUI();
        }

        function resetUI() {
            currentNoteId = null;
            viewMode.classList.add('hidden');
            editorMode.classList.add('hidden');
            emptyState.classList.remove('hidden');
            headerActions.innerHTML = "";
            searchControls.classList.add('hidden');
        }

        function clearSearch() { 
            const mInput = document.getElementById('mobile-search-input');
            const dInput = document.getElementById('desktop-search-input');
            if(mInput) mInput.value = "";
            if(dInput) dInput.value = "";
            handleSearch("", 'manual'); 
        }
    </script>
</body>
</html>
